name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '.claude/**'
      - '**/*.md'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '.claude/**'
      - '**/*.md'
      - '.gitignore'
      - 'LICENSE'

jobs:
  ci-backend:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Type Check
        run: npx tsc --noEmit
      - name: Unit Test
        run: npm test
      - name: Build
        run: npm run build

  ci-frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Type Check
        run: npx tsc --noEmit
      - name: Unit Test
        run: npm test
      - name: Build
        run: npm run build

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [ci-backend, ci-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Create .env for docker-compose
        run: |
          cp .env.example .env
          # E2E 專用 override：避免 frontend build 時注入 production URL
          # 原因：.env.example 的 VITE_API_BASE_URL / CORS_ORIGIN 指向 production
          # 導致 browser login 會打到 Cloudflare Tunnel 外部端點而非 CI backend
          sed -i 's|^VITE_API_BASE_URL=.*|VITE_API_BASE_URL=http://localhost:3000/api/v1|' .env
          sed -i 's|^CORS_ORIGIN=.*|CORS_ORIGIN=http://localhost|' .env
          # 調高 rate limit：E2E 跑 57 個 test，每個 test beforeEach 都會註冊使用者
          # 預設 RATE_LIMIT_AUTH_PER_MIN=10 會在第 6 個 test 起全數 429
          sed -i 's|^RATE_LIMIT_AUTH_PER_MIN=.*|RATE_LIMIT_AUTH_PER_MIN=10000|' .env
          sed -i 's|^RATE_LIMIT_API_PER_MIN=.*|RATE_LIMIT_API_PER_MIN=10000|' .env
          sed -i 's|^RATE_LIMIT_LLM_PER_MIN=.*|RATE_LIMIT_LLM_PER_MIN=10000|' .env

      - name: Start services with docker-compose
        run: docker compose up -d --build

      - name: Wait for services to be ready
        run: |
          echo "Waiting for backend..."
          timeout 90 bash -c 'until curl -sf http://localhost:3000/health > /dev/null 2>&1; do sleep 2; done' || {
            echo "Backend health check timed out. Container logs:"
            docker compose logs backend
            exit 1
          }
          echo "Backend is ready!"
          echo "Waiting for frontend..."
          timeout 60 bash -c 'until curl -sf http://localhost:80 > /dev/null 2>&1; do sleep 2; done' || {
            echo "Frontend health check timed out. Container logs:"
            docker compose logs frontend
            exit 1
          }
          echo "Frontend is ready!"

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        run: npx playwright test
        env:
          E2E_BASE_URL: http://localhost:80

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Stop services
        if: always()
        run: docker compose down -v

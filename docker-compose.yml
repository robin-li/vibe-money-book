name: vibe-money-book

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vibe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vibe_password}
      POSTGRES_DB: ${POSTGRES_DB:-vibe_money_book}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vibe}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://vibe:vibe_password@postgres:5432/vibe_money_book}
      JWT_SECRET: ${JWT_SECRET:-your-jwt-secret-here}
      PORT: ${PORT:-3000}
      NODE_ENV: ${NODE_ENV:-production}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://moneybook.smart-codings.com}
      RATE_LIMIT_AUTH_PER_MIN: ${RATE_LIMIT_AUTH_PER_MIN:-200}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3-flash-preview}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.4-mini}
      LLM_TIMEOUT_MS: ${LLM_TIMEOUT_MS:-30000}
      DEFAULT_GEMINI_API_KEY: ${DEFAULT_GEMINI_API_KEY:-}
      DEFAULT_OPENAI_API_KEY: ${DEFAULT_OPENAI_API_KEY:-}
      GEMINI_MODEL_INCLUDE: ${GEMINI_MODEL_INCLUDE:-}
      GEMINI_MODEL_EXCLUDE: ${GEMINI_MODEL_EXCLUDE:-}
      OPENAI_MODEL_INCLUDE: ${OPENAI_MODEL_INCLUDE:-}
      OPENAI_MODEL_EXCLUDE: ${OPENAI_MODEL_EXCLUDE:-}
      ANTHROPIC_MODEL_INCLUDE: ${ANTHROPIC_MODEL_INCLUDE:-}
      ANTHROPIC_MODEL_EXCLUDE: ${ANTHROPIC_MODEL_EXCLUDE:-}
      XAI_MODEL_INCLUDE: ${XAI_MODEL_INCLUDE:-}
      XAI_MODEL_EXCLUDE: ${XAI_MODEL_EXCLUDE:-}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://moneybook-api.smart-codings.com/api/v1}
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge

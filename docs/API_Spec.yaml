openapi: 3.0.3
info:
  title: Vibe Money Book API
  version: 1.0.0
  description: 語音記帳應用 API — 透過自然語言實現一句話記帳
  contact:
    name: Development Team

servers:
  - url: http://localhost:3000/api/v1
    description: Development Server

tags:
  - name: Authentication
    description: 使用者認證（註冊/登入）
  - name: User
    description: 使用者個人資料管理
  - name: AI
    description: LLM 自然語言解析與人設回饋
  - name: Transactions
    description: 交易記錄 CRUD
  - name: Budget
    description: 預算管理與摘要
  - name: Stats
    description: 消費統計與分佈

paths:
  /auth/register:
    post:
      tags: [Authentication]
      summary: 使用者註冊
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name:
                  type: string
                  minLength: 2
                  maxLength: 50
                  example: 小明
                email:
                  type: string
                  format: email
                  example: ming@example.com
                password:
                  type: string
                  minLength: 8
                  maxLength: 100
      responses:
        '201':
          description: 註冊成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 201
                  message:
                    type: string
                    example: 註冊成功
                  data:
                    type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/User'
                      token:
                        type: string
                  timestamp:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Email 已被註冊
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      tags: [Authentication]
      summary: 使用者登入
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: 登入成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: 登入成功
                  data:
                    type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/User'
                      token:
                        type: string
                  timestamp:
                    type: string
                    format: date-time
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/profile:
    get:
      tags: [User]
      summary: 取得個人資料
      operationId: getProfile
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  data:
                    $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'

    put:
      tags: [User]
      summary: 更新個人資料
      operationId: updateProfile
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 2
                  maxLength: 50
                persona:
                  type: string
                  enum: [sarcastic, gentle, guilt_trip]
                ai_engine:
                  type: string
                  enum: [gemini, openai]
                  description: 使用者偏好的 AI 引擎（PRD-F-013）
                monthly_budget:
                  type: number
                  format: decimal
                  minimum: 0
                  maximum: 10000000
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  data:
                    $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /ai/validate-key:
    post:
      tags: [AI]
      summary: 驗證 LLM API Key
      description: 驗證使用者提供的 LLM API Key 是否有效。後端根據使用者的 ai_engine 偏好，使用對應引擎發送最小化測試請求確認 Key 可用（PRD-F-013）。
      operationId: validateApiKey
      security:
        - BearerAuth: []
      parameters:
        - name: X-LLM-API-Key
          in: header
          required: true
          description: 使用者自行提供的 LLM API Key
          schema:
            type: string
      responses:
        '200':
          description: 驗證成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 200
                  data:
                    type: object
                    properties:
                      valid:
                        type: boolean
                        example: true
                      engine:
                        type: string
                        enum: [gemini, openai]
                  timestamp:
                    type: string
                    format: date-time
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: API Key 無效或 quota 耗盡
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'

  /ai/parse:
    post:
      tags: [AI]
      summary: 解析自然語言輸入
      description: 接收使用者的自然語言文字，呼叫 LLM 資料萃取引擎與人設回饋引擎，回傳結構化結果。不會自動建立交易記錄。後端根據使用者的 ai_engine 偏好選擇對應的 LLM 引擎（PRD-F-013）。
      operationId: aiParse
      security:
        - BearerAuth: []
      parameters:
        - name: X-LLM-API-Key
          in: header
          required: true
          description: 使用者自行提供的 LLM API Key，後端用後即棄不持久化（PRD-F-013）
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [raw_text]
              properties:
                raw_text:
                  type: string
                  minLength: 1
                  maxLength: 500
                  example: 午餐吃拉麵 180 元
      responses:
        '200':
          description: 解析成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 200
                  data:
                    type: object
                    properties:
                      parsed:
                        $ref: '#/components/schemas/ParsedTransaction'
                      feedback:
                        $ref: '#/components/schemas/AIFeedbackContent'
                      budget_context:
                        $ref: '#/components/schemas/BudgetContext'
                  timestamp:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: LLM API Key 無效或 quota 耗盡（PRD-F-013）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
        '502':
          description: LLM 服務暫時不可用
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /transactions:
    post:
      tags: [Transactions]
      summary: 建立交易記錄
      operationId: createTransaction
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount, category, raw_text, transaction_date]
              properties:
                type:
                  type: string
                  enum: [income, expense]
                  default: expense
                  description: 交易類型（收入或消費）
                amount:
                  type: number
                  format: decimal
                  minimum: 0.01
                  example: 180
                category:
                  type: string
                  example: food
                merchant:
                  type: string
                  maxLength: 100
                  example: 拉麵店
                raw_text:
                  type: string
                  maxLength: 500
                  example: 午餐吃拉麵 180 元
                transaction_date:
                  type: string
                  format: date
                  example: '2026-03-16'
                note:
                  type: string
                  maxLength: 500
                feedback:
                  type: object
                  properties:
                    text:
                      type: string
                    emotion_tag:
                      type: string
                    persona_used:
                      type: string
                      enum: [sarcastic, gentle, guilt_trip]
      responses:
        '201':
          description: 交易建立成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 201
                  data:
                    type: object
                    properties:
                      transaction:
                        $ref: '#/components/schemas/Transaction'
                      feedback:
                        $ref: '#/components/schemas/AIFeedback'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

    get:
      tags: [Transactions]
      summary: 查詢交易列表
      operationId: listTransactions
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: category
          in: query
          schema:
            type: string
        - name: start_date
          in: query
          schema:
            type: string
            format: date
        - name: end_date
          in: query
          schema:
            type: string
            format: date
        - name: sort
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        '200':
          description: 查詢成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/TransactionListItem'
                      pagination:
                        $ref: '#/components/schemas/Pagination'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /transactions/{id}:
    get:
      tags: [Transactions]
      summary: 取得交易詳情
      operationId: getTransaction
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  data:
                    $ref: '#/components/schemas/TransactionDetail'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Transactions]
      summary: 刪除交易
      operationId: deleteTransaction
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: 刪除成功
        '404':
          $ref: '#/components/responses/NotFound'

  /budget/summary:
    get:
      tags: [Budget]
      summary: 取得本月預算摘要
      operationId: getBudgetSummary
      security:
        - BearerAuth: []
      parameters:
        - name: month
          in: query
          description: 月份 (YYYY-MM)，預設當月
          schema:
            type: string
            pattern: '^\d{4}-\d{2}$'
            example: '2026-03'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  data:
                    $ref: '#/components/schemas/BudgetSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /budget/categories:
    get:
      tags: [Budget]
      summary: 取得類別預算列表
      operationId: getCategoryBudgets
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  data:
                    type: object
                    properties:
                      categories:
                        type: array
                        items:
                          $ref: '#/components/schemas/CategoryBudget'

    post:
      tags: [Budget]
      summary: 新增自訂類別（PRD-F-012）
      description: 使用者確認 AI 建議的新類別時呼叫此端點。類別數量上限 20。
      operationId: createCategory
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [category]
              properties:
                category:
                  type: string
                  minLength: 2
                  maxLength: 50
                  example: 寵物
                budget_limit:
                  type: number
                  format: decimal
                  minimum: 0
                  default: 0
      responses:
        '201':
          description: 類別新增成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 201
                  message:
                    type: string
                    example: 類別新增成功
                  data:
                    $ref: '#/components/schemas/CategoryBudget'
                  timestamp:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: 類別已存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: 類別數量已達上限
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags: [Budget]
      summary: 批量更新類別預算
      operationId: updateCategoryBudgets
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [categories]
              properties:
                categories:
                  type: array
                  items:
                    type: object
                    required: [category, budget_limit]
                    properties:
                      category:
                        type: string
                      budget_limit:
                        type: number
                        format: decimal
                        minimum: 0
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  data:
                    type: object
                    properties:
                      categories:
                        type: array
                        items:
                          $ref: '#/components/schemas/CategoryBudget'
        '400':
          $ref: '#/components/responses/BadRequest'

  /budget/categories/{category}:
    delete:
      tags: [Budget]
      summary: 刪除自訂類別（PRD-F-012）
      description: 刪除使用者自訂類別。預設類別不可刪除。關聯交易記錄將重新歸類至「其他」。
      operationId: deleteCategory
      security:
        - BearerAuth: []
      parameters:
        - name: category
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: 刪除成功
        '400':
          description: 不可刪除預設類別
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /stats/distribution:
    get:
      tags: [Stats]
      summary: 取得消費類別分佈
      operationId: getDistribution
      security:
        - BearerAuth: []
      parameters:
        - name: month
          in: query
          description: 月份 (YYYY-MM)，預設當月
          schema:
            type: string
            pattern: '^\d{4}-\d{2}$'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  data:
                    type: object
                    properties:
                      month:
                        type: string
                      total_spent:
                        type: number
                      distribution:
                        type: array
                        items:
                          $ref: '#/components/schemas/CategoryDistribution'
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        persona:
          type: string
          enum: [sarcastic, gentle, guilt_trip]
        ai_engine:
          type: string
          enum: [gemini, openai]
          default: gemini
          description: 使用者偏好的 AI 引擎（PRD-F-013）
        monthly_budget:
          type: number
          format: decimal
        currency:
          type: string
        created_at:
          type: string
          format: date-time

    ParsedTransaction:
      type: object
      properties:
        type:
          type: string
          enum: [income, expense]
          default: expense
          description: 交易類型（收入或消費）
        amount:
          type: number
          format: decimal
          nullable: true
        category:
          type: string
          nullable: true
          description: 匹配到的現有類別代碼；若 is_new_category 為 true 則為 null
        merchant:
          type: string
        date:
          type: string
          format: date
        confidence:
          type: number
          minimum: 0
          maximum: 1
        is_new_category:
          type: boolean
          description: 是否為新類別建議（PRD-F-012）
          default: false
        suggested_category:
          type: string
          nullable: true
          description: LLM 建議的新類別名稱，僅當 is_new_category 為 true 時有值

    AIFeedbackContent:
      type: object
      properties:
        text:
          type: string
        emotion_tag:
          type: string

    BudgetContext:
      type: object
      properties:
        monthly_budget:
          type: number
        spent_this_month:
          type: number
        remaining:
          type: number
        used_ratio:
          type: number
        category_spent:
          type: number
        category_limit:
          type: number

    Transaction:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum: [income, expense]
          default: expense
        amount:
          type: number
          format: decimal
        category:
          type: string
        merchant:
          type: string
        raw_text:
          type: string
        note:
          type: string
        transaction_date:
          type: string
          format: date
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    TransactionListItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum: [income, expense]
          default: expense
        amount:
          type: number
          format: decimal
        category:
          type: string
        merchant:
          type: string
        transaction_date:
          type: string
          format: date
        created_at:
          type: string
          format: date-time

    TransactionDetail:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum: [income, expense]
          default: expense
        amount:
          type: number
          format: decimal
        category:
          type: string
        merchant:
          type: string
        raw_text:
          type: string
        note:
          type: string
        transaction_date:
          type: string
          format: date
        created_at:
          type: string
          format: date-time
        feedback:
          type: object
          nullable: true
          properties:
            feedback_text:
              type: string
            emotion_tag:
              type: string
            persona_used:
              type: string

    AIFeedback:
      type: object
      properties:
        id:
          type: string
          format: uuid
        feedback_text:
          type: string
        emotion_tag:
          type: string
        persona_used:
          type: string
        created_at:
          type: string
          format: date-time

    BudgetSummary:
      type: object
      properties:
        month:
          type: string
        monthly_budget:
          type: number
        total_spent:
          type: number
        remaining:
          type: number
        used_ratio:
          type: number
        transaction_count:
          type: integer
        category_summary:
          type: array
          items:
            type: object
            properties:
              category:
                type: string
              spent:
                type: number
              budget_limit:
                type: number
              used_ratio:
                type: number

    CategoryBudget:
      type: object
      properties:
        category:
          type: string
        budget_limit:
          type: number
          format: decimal
        is_custom:
          type: boolean
          description: 是否為使用者自訂類別
          default: false

    CategoryDistribution:
      type: object
      properties:
        category:
          type: string
        amount:
          type: number
        ratio:
          type: number
        count:
          type: integer

    Pagination:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        pages:
          type: integer

    ErrorResponse:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              reason:
                type: string
        timestamp:
          type: string
          format: date-time

  responses:
    BadRequest:
      description: 參數驗證失敗
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Unauthorized:
      description: 未認證或 Token 過期
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    NotFound:
      description: 資源不存在
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    RateLimitExceeded:
      description: 超出速率限制
      headers:
        X-RateLimit-Limit:
          description: 每分鐘允許的最大請求數
          schema:
            type: integer
        X-RateLimit-Remaining:
          description: 當前時間窗口內剩餘請求數
          schema:
            type: integer
        X-RateLimit-Reset:
          description: 速率限制重置的 Unix 時間戳
          schema:
            type: integer
        Retry-After:
          description: 建議等待秒數
          schema:
            type: integer
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
